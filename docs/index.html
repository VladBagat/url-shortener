<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortify Demo</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-border: rgba(69, 58, 50, 0.12);
      --text: #2b211b;
      --muted: #6f635b;
      --accent: #d46a4c;
      --accent-dark: #b55135;
      --accent-soft: rgba(212, 106, 76, 0.14);
      --shadow: 0 22px 60px rgba(66, 45, 33, 0.14);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(212, 106, 76, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(153, 186, 167, 0.22), transparent 34%),
        linear-gradient(135deg, #f7f3ec 0%, #efe5d7 100%);
      display: grid;
      justify-items: center;
      align-content: start;
      padding: 48px 24px 24px;
    }

    .card {
      width: min(100%, 680px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .eyebrow {
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      color: var(--accent-dark);
      font-family: "Trebuchet MS", Arial, sans-serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.95;
      font-weight: 700;
    }

    .subtext {
      margin: 16px 0 28px;
      color: var(--muted);
      max-width: 44ch;
      line-height: 1.6;
      font-size: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input[type="url"] {
      width: 100%;
      border: 1px solid rgba(69, 58, 50, 0.14);
      border-radius: 16px;
      padding: 16px 18px;
      font: inherit;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input[type="url"]:focus,
    .result-box:focus-within {
      border-color: rgba(212, 106, 76, 0.7);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 0 22px;
      min-height: 56px;
      font: 600 1rem/1 "Trebuchet MS", Arial, sans-serif;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.75;
    }

    .primary {
      background: var(--accent);
      color: #fffaf6;
      box-shadow: 0 14px 28px rgba(212, 106, 76, 0.28);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .result {
      margin-top: 22px;
      display: none;
      animation: rise 0.28s ease;
    }

    .result.visible {
      display: block;
    }

    .result-label {
      margin: 0 0 10px;
      color: var(--muted);
      font: 600 0.92rem/1.2 "Trebuchet MS", Arial, sans-serif;
    }

    .result-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(69, 58, 50, 0.14);
      background: rgba(255, 255, 255, 0.88);
    }

    .result-box input {
      border: 0;
      padding: 10px 12px;
      background: transparent;
      color: var(--text);
      min-width: 0;
    }

    .secondary {
      min-height: 44px;
      background: #f4e0d7;
      color: var(--accent-dark);
    }

    .secondary:hover {
      background: #edd1c5;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      font: 0.95rem/1.5 "Trebuchet MS", Arial, sans-serif;
    }

    .status.error {
      color: #a33333;
    }

    .status.success {
      color: #2d6a4f;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px;
      }

      .form-row,
      .result-box {
        grid-template-columns: 1fr;
      }

      button,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Static demo</p>
    <h1>Turn long links into short ones.</h1>
    <p class="subtext">
      Paste a URL, press Shortify, and get a compact link back from your API.
    </p>

    <form id="shortify-form">
      <div class="form-row">
        <input
          id="url-input"
          name="url"
          type="url"
          placeholder="https://example.com/article/very/long/link"
          autocomplete="url"
          required
        >
        <button id="submit-button" class="primary" type="submit">Shortify</button>
      </div>
    </form>

    <div id="status" class="status" aria-live="polite"></div>

    <section id="result" class="result" aria-live="polite">
      <p class="result-label">Your short URL</p>
      <div class="result-box">
        <input id="result-url" type="text" readonly>
        <button id="copy-button" class="secondary" type="button">Copy</button>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://api.rdrt.click/shorten";
    const SHORT_BASE_URL = API_URL.replace(/\/shorten$/, "/");

    const form = document.getElementById("shortify-form");
    const urlInput = document.getElementById("url-input");
    const submitButton = document.getElementById("submit-button");
    const resultSection = document.getElementById("result");
    const resultUrl = document.getElementById("result-url");
    const copyButton = document.getElementById("copy-button");
    const status = document.getElementById("status");

    function setStatus(message, tone) {
      status.textContent = message;
      status.className = "status" + (tone ? " " + tone : "");
    }

    function isValidUrl(value) {
      try {
        const parsed = new URL(value);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
      } catch {
        return false;
      }
    }

    async function copyResult() {
      if (!resultUrl.value) {
        return;
      }

      try {
        await navigator.clipboard.writeText(resultUrl.value);
        setStatus("Short link copied to clipboard.", "success");
      } catch {
        resultUrl.select();
        document.execCommand("copy");
        setStatus("Short link copied to clipboard.", "success");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const longUrl = urlInput.value.trim();

      if (!isValidUrl(longUrl)) {
        resultSection.classList.remove("visible");
        setStatus("Please enter a valid http or https URL.", "error");
        urlInput.focus();
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Working...";
      setStatus("Creating your short URL...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url: longUrl })
        });

        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || "Something went wrong.");
        }

        const fullShortUrl = new URL(payload.short_url, SHORT_BASE_URL).toString();
        resultUrl.value = fullShortUrl;
        resultSection.classList.add("visible");
        setStatus("Short URL created successfully.", "success");
      } catch (error) {
        resultSection.classList.remove("visible");
        setStatus(error.message || "Unable to create a short URL right now.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Shortify";
      }
    });

    copyButton.addEventListener("click", copyResult);
  </script>
</body>
</html>
